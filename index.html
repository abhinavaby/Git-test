<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator-app">
    <h1>Calculator</h1>
    <div class="calculator">
      <input type="text" class="calculator-screen" value="" readonly />
      <div class="calculator-keys">
        <button class="key key-clear" data-action="clear">C</button>
        <button class="key key-delete" data-action="delete">DEL</button>
        <button class="key key-operator" data-value="÷">÷</button>
        <button class="key key-operator" data-value="×">×</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key key-operator" data-value="-">-</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key key-operator" data-value="+">+</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key key-equals" data-action="calculate">=</button>

        <button class="key key-zero" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
